name: Kirara 開運Bot 自動投稿

on:
  schedule:
    # 毎日 9:00 JST（= UTC 00:00）に朝の投稿
    - cron: '0 0 * * *'
    # 毎日 21:00 JST（= UTC 12:00）に夜の投稿
    - cron: '0 12 * * *'
  # 手動実行も可能にする（GitHubのActionsタブから「Run workflow」ボタンで実行）
  workflow_dispatch:
    inputs:
      time_of_day:
        description: '投稿タイミング（morning または evening）'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install openai tweepy python-dotenv schedule

      - name: Secretsの確認（デバッグ用）
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "ERROR: OPENAI_API_KEY が空です"
          else
            echo "OK: OPENAI_API_KEY が設定されています（先頭7文字: ${OPENAI_API_KEY:0:7}...）"
          fi
          if [ -z "$X_API_KEY" ]; then
            echo "ERROR: X_API_KEY が空です"
          else
            echo "OK: X_API_KEY が設定されています"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}

      - name: 朝の投稿（9:00 JST）
        if: >
          github.event.schedule == '0 0 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.time_of_day == 'morning')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python kirara_bot.py --post morning

      - name: 夜の投稿（21:00 JST）
        if: >
          github.event.schedule == '0 12 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.time_of_day == 'evening')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python kirara_bot.py --post evening
