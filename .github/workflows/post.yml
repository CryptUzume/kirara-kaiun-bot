name: Kirara Bot

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      time_of_day:
        description: 'morning or evening'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai tweepy python-dotenv
            - name: check
        run: echo "KEY=${OPENAI_API_KEY:0:7}"
      - name: morning
        if: github.event.schedule == '0 0 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.time_of_day == 'morning')
        run: python kirara_bot.py --post morning
      - name: evening
        if: github.event.schedule == '0 12 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.time_of_day == 'evening')
        run: python kirara_bot.py --post evening
